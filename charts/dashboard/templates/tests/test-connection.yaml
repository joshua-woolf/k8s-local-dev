apiVersion: v1
kind: Pod
metadata:
  name: dashboard-test-connection
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.20.0
      imagePullPolicy: IfNotPresent
      args:
        - --fail
        - --silent
        - --show-error
        - http://dashboard.{{ .Release.Namespace }}.svc.cluster.local/readyz
