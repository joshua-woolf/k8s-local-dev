apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
  name: dashboard-credentials
  namespace: {{ .Values.credentials.namespace }}
rules:
  - apiGroups:
      - ""
    resourceNames:
      {{- toYaml .Values.credentials.secretNames | nindent 6 }}
    resources:
      - secrets
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
  name: dashboard-credentials
  namespace: {{ .Values.credentials.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dashboard-credentials
subjects:
  - kind: ServiceAccount
    name: dashboard
    namespace: {{ .Release.Namespace }}
