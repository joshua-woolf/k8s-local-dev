apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-admin
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey-admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey-admin
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey-admin
          image: local/valkey-admin:1.0.1-local
          imagePullPolicy: IfNotPresent
          env:
            - name: DEPLOYMENT_MODE
              value: Web
            - name: LOCAL_VALKEY_HOST
              value: valkey.data.svc.cluster.local
            - name: LOCAL_VALKEY_PORT
              value: "6379"
            - name: LOCAL_VALKEY_TLS
              value: "false"
            - name: LOCAL_VALKEY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: valkey-credentials
                  key: username
            - name: LOCAL_VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey-credentials
                  key: password
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: metrics-data
              mountPath: /app/apps/server/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: metrics-data
          emptyDir:
            sizeLimit: 512Mi
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-admin
  namespace: data
spec:
  selector:
    app.kubernetes.io/name: valkey-admin
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: valkey-admin
  namespace: data
  annotations:
    cert-manager.io/cluster-issuer: local-dev-ca
    localdev.dashboard/enabled: "true"
    localdev.dashboard/name: Valkey Admin
    localdev.dashboard/category: Data tools
    localdev.dashboard/description: Valkey administration with the local instance preconfigured
    localdev.dashboard/credentials: none
spec:
  ingressClassName: traefik
  rules:
    - host: valkey-ui.k8s.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: valkey-admin
                port:
                  name: http
  tls:
    - hosts:
        - valkey-ui.k8s.localhost
      secretName: valkey-admin-tls
