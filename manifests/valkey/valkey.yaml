apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: data
  annotations:
    localdev.dashboard/enabled: "true"
    localdev.dashboard/name: Valkey
    localdev.dashboard/category: Data
    localdev.dashboard/description: Persistent single-node Valkey data store
    localdev.dashboard/host: valkey.k8s.localhost
    localdev.dashboard/port: "6379"
    localdev.dashboard/protocol: valkey
spec:
  selector:
    app.kubernetes.io/name: valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey
  namespace: data
spec:
  serviceName: valkey
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: docker.io/valkey/valkey:9.1.0-alpine
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - exec valkey-server --appendonly yes --requirepass "$VALKEY_PASSWORD"
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: valkey-credentials
                  key: password
          ports:
            - name: valkey
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: valkey
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: valkey
            initialDelaySeconds: 20
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 999
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: valkey
  namespace: data
spec:
  entryPoints:
    - valkey
  routes:
    - match: HostSNI(`*`)
      services:
        - name: valkey
          port: 6379
