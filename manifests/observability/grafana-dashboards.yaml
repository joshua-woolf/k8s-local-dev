apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: observability
data:
  local-dev.yaml: |
    apiVersion: 1
    providers:
      - name: local-dev
        orgId: 1
        folder: Local development
        folderUid: local-development
        type: file
        disableDeletion: false
        editable: false
        updateIntervalSeconds: 10
        options:
          path: /otel-lgtm/grafana/dashboards/local-dev
