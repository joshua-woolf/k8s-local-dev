replicas: 1
auditInterval: 60
validatingWebhookFailurePolicy: Ignore

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8888"
  prometheus.io/path: /metrics

pdb:
  controllerManager:
    minAvailable: 0

controllerManager:
  exemptNamespacePrefixes:
    - kube-
  exemptNamespaces:
    - cert-manager
    - cnpg-system
    - gatekeeper-system
    - kafka-system
    - observability
    - traefik
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi

audit:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi
